include "frontend.conf"

appName="euvat-filing-frontend"

# A simple list of EU member states for the type-ahead. Format: "Display Name|CODE"
eu.member-states = [
  "Austria|AT",
  "Belgium|BE",
  "Bulgaria|BG",
  "Canary Islands|ES",
  "Ceuta|ES",
  "Croatia|HR",
  "Cyprus|CY",
  "Czech Republic|CZ",
  "Denmark|DK",
  "Estonia|EE",
  "Finland|FI",
  "France|FR",
  "Germany|DE",
  "Greece|GR",
  "Hungary|HU",
  "Ireland|IE",
  "Italy|IT",
  "Latvia|LV",
  "Lithuania|LT",
  "Luxembourg|LU",
  "Malta|MT",
  "Melilla|ES",
  "Monaco|MC",
  "Netherlands|NL",
  "Poland|PL",
  "Portugal|PT",
  "Romania|RO",
  "Slovakia|SK",
  "Slovenia|SI",
  "Spain|ES",
  "Sweden|SE"
]

play.http.router = prod.Routes

play.http.errorHandler = "handlers.ErrorHandler"

play.modules.enabled += "uk.gov.hmrc.play.bootstrap.AuthModule"
play.modules.enabled += "uk.gov.hmrc.mongo.play.PlayMongoModule"
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.HttpClientV2Module"
play.modules.enabled += "config.Module"

play.filters.enabled += play.filters.csp.CSPFilter

play.i18n.langs = ["en", "cy"]

microservice {
    services {
      auth {
        protocol = http
        host     = localhost
        port     = 8500
      }

      feedback-frontend {
        protocol = http
        host     = localhost
        port     = 9514
      }
    }
}

contact-frontend {
  host      = "http://localhost:9250"
  serviceId = "euvat-filing-frontend"
}

timeout-dialog {
  timeout   = 900
  countdown = 120
}

session {
  timeoutSeconds = 900
}

mongodb {
  uri                 = "mongodb://localhost:27017/"${appName}
  timeToLiveInSeconds = 900
}

urls {
  login         = "http://localhost:9949/auth-login-stub/gg-sign-in"
  loginContinue = "http://localhost:9000/euvat-filing-frontend"
  signOut       = "http://localhost:9553/bas-gateway/sign-out-without-state"
}

host = "http://localhost:9000"

accessibility-statement{
  service-path = "/euvat-filing-frontend"
}

tracking-consent-frontend {
  gtm.container = "transitional"
}

play-frontend-hmrc {
    useRebrand = false
}


features {
  welsh-translation: true
}
