play.ws.timeout.request = 60000ms
play.ws.timeout.connection = 60000ms

# Refund settings
settings.refund.can.amend.vrns="999900102,999900104"
settings.refund.can.create.vrns="999900106"
# earliest and latest permitted start dates in MM/yy format. If absent, defaults apply.
settings.refund.start.date.earliest.permitted="01/21"
settings.refund.start.date.latest.permitted="12/20"
